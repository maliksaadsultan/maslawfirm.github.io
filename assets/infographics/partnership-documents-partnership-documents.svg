nt-size="30" font-weight="800" fill="#3f3f46" font-family="Arial, Helvetica, sans-serif">Deed Pack</text><text x="1074" y="620" font-size="21" font-weight="500" fill="#334155" font-family="Arial, Helvetica, sans-serif"><tspan x="1074" dy="0">Agreement and supporting</tspan><tspan x="1074" dy="28">papers.</tspan></text><line x1="1074" y1="684" x2="1426" y2="684" stroke="#d9e2ec" stroke-width="2"/><text x="1074" y="726" font-size="20" font-weight="700" fill="#64748b" font-family="Arial, Helvetica, sans-serif">Keep this part ready before filing.</text>

