  <rect x="896" y="182" width="580" height="150" rx="24" fill="rgba(255,255,255,0.92)"/><circle cx="946" cy="222" r="18" fill="#84cc16"/><text x="946" y="229" text-anchor="middle" font-size="16" font-weight="700" fill="#0b3b22" font-family="Arial, Helvetica, sans-serif">1</text><text x="982" y="228" font-size="30" font-weight="800" fill="#0b3b22" font-family="Arial, Helvetica, sans-serif">Gather Records</text><text x="930" y="274" font-size="20" font-weight="500" fill="#334155" font-family="Arial, Helvetica, sans-serif"><tspan x="930" dy="0">Pull together income and asset</tspan><tspan x="930" dy="26">details.</tspan></text><rect x="896" y="377" width="580" height="150" rx="24" fill="rgba(255,255,255,0.92)"/><circle cx="946" cy="417" r="18" fill="#84cc16"/><text x="946" y="424" text-anchor="middle" font-size="16" font-weight="700" fill="#0b3b22" font-family="Arial, Helvetica, sans-serif">2</text><text x="982" y="423" font-size="30" font-weight="800" fill="#0b3b22" font-family="Arial, Helvetica, sans-serif">Prepare Return</text><text x="930" y="469" font-size="20" font-weight="500" fill="#334155" font-family="Arial, Helvetica, sans-serif"><tspan x="930" dy="0">Translate records into filing</tspan><tspan x="930" dy="26">entries.</tspan></text><rect x="896" y="572" width="580" height="150" rx="24" fill="rgba(255,255,255,0.92)"/><circle cx="946" cy="612" r="18" fill="#84cc16"/><text x="946" y="619" text-anchor="middle" font-size="16" font-weight="700" fill="#0b3b22" font-family="Arial, Helvetica, sans-serif">3</text><text x="982" y="618" font-size="30" font-weight="800" fill="#0b3b22" font-family="Arial, Helvetica, sans-serif">Stay Filer</text><text x="930" y="664" font-size="20" font-weight="500" fill="#334155" font-family="Arial, Helvetica, sans-serif"><tspan x="930" dy="0">Maintain compliance year after</tspan><tspan x="930" dy="26">year.</tspan></text>

