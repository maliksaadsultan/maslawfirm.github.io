  <rect x="94" y="392" width="500" height="360" rx="32" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
  <text x="136" y="452" font-size="26" font-weight="700" fill="#e4e4e7" font-family="Arial, Helvetica, sans-serif">What Improves</text>
  <text x="136" y="518" font-size="60" font-weight="800" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">3</text>
  <text x="136" y="560" font-size="24" font-weight="700" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif">clear reasons clients choose this route</text>
  <circle cx="180" cy="648" r="10" fill="#22c55e"/>
  <text x="206" y="655" font-size="22" font-weight="700" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">Stronger protection and structure</text>
  <circle cx="180" cy="702" r="10" fill="#22c55e"/>
  <text x="206" y="709" font-size="22" font-weight="700" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">More confidence for investors and authorities</text>
  <circle cx="180" cy="756" r="10" fill="#22c55e"/>
  <text x="206" y="763" font-size="22" font-weight="700" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">Cleaner compliance and operating discipline</text>
  <rect x="770" y="282" width="360" height="54" rx="20" fill="#22c55e" opacity="0.88"/><text x="796" y="317" font-size="24" font-weight="800" fill="#3f3f46" font-family="Arial, Helvetica, sans-serif">Simple Setup</text><text x="796" y="378" font-size="21" font-weight="500" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif"><tspan x="796" dy="0">A direct option for co-founders.</tspan></text><rect x="770" y="462" width="300" height="54" rx="20" fill="#22c55e" opacity="0.88"/><text x="796" y="497" font-size="24" font-weight="800" fill="#3f3f46" font-family="Arial, Helvetica, sans-serif">Role Clarity</text><text x="796" y="558" font-size="21" font-weight="500" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif"><tspan x="796" dy="0">Make commercial responsibilities</tspan><tspan x="796" dy="26">explicit.</tspan></text><rect x="770" y="642" width="420" height="54" rx="20" fill="#22c55e" opacity="0.88"/><text x="796" y="677" font-size="24" font-weight="800" fill="#3f3f46" font-family="Arial, Helvetica, sans-serif">Legal Support</text><text x="796" y="738" font-size="21" font-weight="500" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif"><tspan x="796" dy="0">Document terms for disputes and</tspan><tspan x="796" dy="26">continuity.</tspan></text>

