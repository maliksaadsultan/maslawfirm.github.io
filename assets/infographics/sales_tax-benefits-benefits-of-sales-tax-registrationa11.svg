  <rect x="94" y="392" width="500" height="360" rx="32" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
  <text x="136" y="452" font-size="26" font-weight="700" fill="#cffafe" font-family="Arial, Helvetica, sans-serif">What Improves</text>
