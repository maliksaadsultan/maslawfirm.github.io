  <circle cx="112" cy="706" r="22" fill="#f59e0b"/><text x="112" y="713" text-anchor="middle" font-size="18" font-weight="700" fill="#365314" font-family="Arial, Helvetica, sans-serif">1</text><rect x="70" y="756" width="330" height="150" rx="24" fill="rgba(255,255,255,0.92)"/><text x="100" y="810" font-size="28" font-weight="800" fill="#365314" font-family="Arial, Helvetica, sans-serif">Create Profile</text><text x="100" y="854" font-size="20" font-weight="500" fill="#334155" font-family="Arial, Helvetica, sans-serif"><tspan x="100" dy="0">Set up the owner tax</tspan><tspan x="100" dy="26">identity.</tspan></text><circle cx="582" cy="706" r="22" fill="#f59e0b"/><text x="582" y="713" text-anchor="middle" font-size="18" font-weight="700" fill="#365314" font-family="Arial, Helvetica, sans-serif">2</text><rect x="540" y="756" width="330" height="150" rx="24" fill="rgba(255,255,255,0.92)"/><text x="570" y="810" font-size="28" font-weight="800" fill="#365314" font-family="Arial, Helvetica, sans-serif">Prepare Proof</text><text x="570" y="854" font-size="20" font-weight="500" fill="#334155" font-family="Arial, Helvetica, sans-serif"><tspan x="570" dy="0">Collect business and address</tspan><tspan x="570" dy="26">records.</tspan></text><circle cx="1052" cy="706" r="22" fill="#f59e0b"/><text x="1052" y="713" text-anchor="middle" font-size="18" font-weight="700" fill="#365314" font-family="Arial, Helvetica, sans-serif">3</text><rect x="1010" y="756" width="330" height="150" rx="24" fill="rgba(255,255,255,0.92)"/><text x="1040" y="810" font-size="28" font-weight="800" fill="#365314" font-family="Arial, Helvetica, sans-serif">Begin Trading</text><text x="1040" y="854" font-size="20" font-weight="500" fill="#334155" font-family="Arial, Helvetica, sans-serif"><tspan x="1040" dy="0">Use the profile in</tspan><tspan x="1040" dy="26">day-to-day operations.</tspan></text>

